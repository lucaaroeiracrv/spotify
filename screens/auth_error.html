<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication Failed</title>
    <link rel="stylesheet" href="/screens/auth_error.css">
</head>
<body>
    <div class="card">
        <div class="status-icon">
            <svg class="icon error" viewBox="0 0 52 52">
                <circle cx="26" cy="26" r="25" fill="none"/>
                <line x1="16" y1="16" x2="36" y2="36"/>
                <line x1="36" y1="16" x2="16" y2="36"/>
            </svg>
        </div>
        <h1 class="title">Falha na Autenticação</h1>
        <p class="subtitle" id="errorMessage">Não foi possível autenticar. Verifique as credenciais e tente novamente.</p>
        <button class="button" id="closeButton">Fechar</button>
    </div>
    <script>
        document.getElementById('closeButton').addEventListener('click', () => {
            window.close();
            setTimeout(() => {
                if (!window.closed) {
                    const hint = document.createElement('p');
                    hint.style.color = '#f8e6e6';
                    hint.style.fontStyle = 'italic';
                    hint.textContent = 'Esta aba não pode ser fechada automaticamente no seu navegador. Feche-a manualmente.';
                    document.querySelector('.card').appendChild(hint);
                }
            }, 100);
        });
    </script>
</body>
</html>
